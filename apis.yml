apis:
  - aid: amazon-datazone:amazon-datazone-api
    name: Amazon DataZone API
    description: >-
      The Amazon DataZone API provides programmatic access to create and manage
      data domains, data assets, data catalogs, projects, subscriptions, and
      governance policies for enterprise-wide data management and sharing.
      Supports domain-based governance, asset cataloging, subscription workflows,
      and environment provisioning for data analytics access.
