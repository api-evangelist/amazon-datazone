aid: amazon-datazone
name: Amazon DataZone
description: >-
  Amazon DataZone is a data management service that helps you catalog, discover,
  govern, share, and analyze your data across your organization and beyond.
  It enables data producers and consumers to collaborate, with built-in
  governance, data catalog capabilities, and a business data catalog to organize
  and share data across your AWS environment. DataZone provides domain-based
  governance, project workspaces, subscription-based access control, and
  integration with AWS analytics services.
