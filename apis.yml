  - type: Features
    data:
      - name: Business Data Catalog
        description: >-
          Central catalog where data producers publish assets and data consumers
          can discover, understand, and request access to data products.
      - name: Domain-Based Governance
        description: >-
          Organize data assets, users, and governance policies within domains
          that reflect your organizational structure and data ownership.
      - name: Subscription Workflow
        description: >-
          Built-in request/approval workflow for data consumers to request
          access to data assets with business justification and audit trail.
      - name: Project Workspaces
        description: >-
          Isolated project containers within domains where teams organize
          their data assets, environments, and members.
      - name: Analytics Environment Provisioning
        description: >-
          Automatically provision data access environments with Athena, Glue,
          Redshift, or other tools when subscriptions are approved.
      - name: Glue Data Catalog Integration
        description: >-
          Automatically discover and import tables from AWS Glue Data Catalog
          into DataZone for cataloging and governance.
      - name: Data Lineage
        description: >-
          Track data lineage across assets to understand data origins,
          transformations, and dependencies for trust and compliance.
  - type: UseCases
    data:
      - name: Enterprise Data Marketplace
        description: >-
          Build an internal data marketplace where business units publish
          their data products for discovery and consumption by other teams.
      - name: Data Access Governance
        description: >-
          Implement governed data access with approval workflows ensuring
          data consumers have proper authorization and business justification.
      - name: Cross-Account Data Sharing
        description: >-
          Share data assets across AWS accounts within an organization using
          DataZone's subscription and access management capabilities.
      - name: Self-Service Analytics
        description: >-
          Enable analysts to discover and access data independently through
          the DataZone catalog with automatic environment provisioning.
      - name: Regulatory Data Compliance
        description: >-
          Maintain audit trails of data access, govern sensitive data assets,
          and enforce data residency policies through domain governance.
  - type: Integrations
    data:
      - name: AWS Glue
        description: >-
          DataZone integrates with Glue Data Catalog to automatically discover,
          import, and catalog Glue tables for sharing and governance.
      - name: Amazon Redshift
        description: >-
          Catalog Redshift tables and views and govern cross-cluster data
          sharing through DataZone subscription workflows.
      - name: Amazon Athena
        description: >-
          DataZone environments provision Athena as a query engine for
          subscribers accessing S3-based data assets.
      - name: Amazon S3
        description: >-
          Catalog S3-based datasets in DataZone and control access through
          subscription-based Lake Formation permissions.
      - name: AWS Lake Formation
        description: >-
          DataZone uses Lake Formation for fine-grained column and row-level
          access control when subscriptions are approved.
      - name: AWS IAM
        description: >-
          IAM roles provide domain execution context and identity-based access
          control for DataZone resources and catalog operations.
